<div id="financeScreen" class="finance-screen hidden">
  <div class="finance-header">
    <h2>Finance</h2>
    <button id="financeCloseBtn">✖</button>
  </div>

  <div class="finance-panel-tabs">
    <button id="financeNavDashboard" class="active">Обзор</button>
    <button id="financeNavWallets">Счета</button>
    <button id="financeNavIncome">Доходы</button>
    <button id="financeNavExpenses">Расходы</button>
    <button id="financeNavTransfers">Переводы</button>
    <button id="financeNavHistory">История</button>
  </div>

  <div id="financePanel-dashboard" class="finance-panel">
    <div id="financeDashboard"></div>
  </div>

  <div id="financePanel-wallets" class="finance-panel hidden">

    <div id="financeWalletList"></div>
    
  <div class="finance-buttons-row">
      <button id="btnAddWallet">Добавить кошелек</button>
    </div>
  </div>

  <div id="financePanel-income" class="finance-panel hidden">
    <div class="finance-form">
      <div class="form-row">
        <input id="incomeName" placeholder="Название дохода" hidden>
        <select id="incomeCurrency"></select>
      </div>
      <div class="form-row">
        <select id="incomeCategory"></select>
        <input id="incomeAmount" type="number" placeholder="Сумма">
      </div>
      <textarea id="incomeComment" placeholder="Комментарий"></textarea>
      <button id="btnSaveIncome">Сохранить доход</button>
    </div>
    <div id="financeTransactionList"></div>
  </div>

  <div id="financePanel-expenses" class="finance-panel hidden">
    <div class="finance-form">
      <div class="form-row">
        <input id="expenseName" placeholder="Название расхода" hidden>
        <select id="expenseCurrency"></select>
      </div>
      <div class="form-row">
        <select id="expenseCategory"></select>
        <input id="expenseAmount" type="number" placeholder="Сумма">
      </div>
      <textarea id="expenseComment" placeholder="Комментарий"></textarea>
      <button id="btnSaveExpense">Сохранить расход</button>
    </div>
    <div id="financeTransactionListExpense"></div>
  </div>

  <div id="financePanel-transfers" class="finance-panel hidden">
    <div class="finance-form">
      <div class="form-row">
        <select id="transferFrom"></select>
        <select id="transferTo"></select>
      </div>
      <div class="form-row">
        <input id="transferAmountFrom" type="number" placeholder="Сумма списания">
        <input id="transferAmountTo" type="number" placeholder="Сумма зачисления">
      </div>
      <textarea id="transferComment" placeholder="Комментарий"></textarea>
      <button id="btnSaveTransfer">Сохранить перевод</button>
    </div>
    <div id="financeTransferPreview"></div>
  </div>

  <div id="financePanel-categories" class="finance-panel" hidden>
    <div id="financeCategoryList"></div>
  </div>

  <!-- История транзакций -->
<div id="financePanel-history" class="finance-panel">
  <!-- Заголовок-кнопка (всегда виден) -->
  <div class="finance-history-header" id="financeHistoryToggle">
    <span>📜 История операций</span>
    <span class="toggle-icon">▼</span> <!-- Стрелочка для наглядности -->
  </div>

  <!-- Контент (по умолчанию скрыт) -->
  <div id="financeHistoryContent" class="hidden">
    <div class="finance-search-row">
      <input id="financeSearchInput" placeholder="Поиск по операциям...">
    </div>
    <div id="financeHistoryList"></div>
  </div>
</div>

</div>
